# Rebuild the shop from the Google Sheet and publish it.
#
# Publishing is ON-DEMAND, not scheduled:
#   • Recommended (Cloudflare Pages): the client clicks "Опубликовать" in the Google
#     Sheet → a Cloudflare Deploy Hook rebuilds the site. This workflow isn't even
#     needed in that setup. See docs/PUBLISH.md.
#   • This workflow is a fallback / for the cPanel (FTP) path: run it by hand from the
#     Actions tab ("Run workflow").
#
# One-time setup (repo → Settings → Secrets and variables → Actions):
#   CATALOG_SHEET_URL   – the sheet's "Publish to web → CSV" link  (required)
#   then ONE deploy target:
#     • Cloudflare Pages:  CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CF_PAGES_PROJECT
#     • cPanel / iphost (FTP):  FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Deploy steps run only when their secrets are present, so this is safe to commit now.

name: Publish shop

on:
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      CATALOG_SHEET_URL: ${{ secrets.CATALOG_SHEET_URL }}
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build catalog from the Google Sheet (falls back to local ODS)
        run: npm run catalog

      - run: npm run build

      # --- Deploy option A: Cloudflare Pages (free, recommended) ---
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CF_PAGES_PROJECT }}

      # --- Deploy option B: cPanel / iphost over FTP ---
      - name: Deploy to cPanel (FTP)
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
